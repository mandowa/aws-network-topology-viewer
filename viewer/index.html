<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Network Architecture</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1>AWS Network Architecture</h1>
      <div id="metadata" class="metadata">Loading...</div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-left">
      <div id="summary-badges" class="summary-badges"></div>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="zoom-out" title="Zoom Out">−</button>
      <button class="tool-btn" id="zoom-reset" title="Reset">⟲</button>
      <button class="tool-btn" id="zoom-in" title="Zoom In">+</button>
      <button class="tool-btn" id="fit-btn" title="Fit to Screen">⊞</button>
    </div>
  </div>

  <main class="canvas-wrap">
    <div id="canvas" class="canvas">
      <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </main>

  <aside id="detail-panel" class="detail-panel hidden">
    <div class="panel-header">
      <span id="panel-title">Details</span>
      <button id="panel-close" class="panel-close-btn">✕</button>
    </div>
    <div id="panel-body" class="panel-body"></div>
  </aside>

  <div id="legend" class="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-items" id="legend-items"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
