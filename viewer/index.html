<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS DR Topology Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1>AWS DR Topology</h1>
      <div id="metadata" class="metadata">Loading metadata...</div>
    </div>
  </header>

  <main class="app-main">
    <section class="top-section">
      <div class="summary-area">
        <h2 class="section-title">Summary Metrics</h2>
        <div id="summary-cards" class="cards-grid"></div>
      </div>
      
      <div class="purpose-area">
        <h2 class="section-title">Purpose Groups</h2>
        <div id="purpose-groups" class="tags-row"></div>
      </div>
    </section>

    <div class="split-layout">
      <aside class="sidebar">
        <div class="search-container">
          <input type="text" id="vpc-search" placeholder="Search VPCs by name or ID..." autocomplete="off">
        </div>
        <div id="vpc-list-container" class="vpc-list-container">
          <ul id="vpc-list" class="vpc-list"></ul>
        </div>
      </aside>

      <div class="middle-pane">
        <div class="graph-header">
          <h2 class="section-title">Relationship Map</h2>
          <div class="graph-controls">
            <div class="graph-legend" id="graph-legend"></div>
            <div class="zoom-controls">
              <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
              <button class="zoom-btn" id="zoom-reset" title="Reset View">⟲</button>
              <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
            </div>
          </div>
        </div>
        <div id="graph-container" class="graph-container"></div>
      </div>

      <aside class="detail-pane">
        <h2 class="section-title">Details Panel</h2>
        <div id="detail-content" class="detail-content">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <p>Select a VPC or graph node to view its configuration and relationships.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
